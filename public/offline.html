<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeGriffus | Sem Conexão</title>
    <link rel="icon" type="image/png" href="/assets/img/icone_tradegriffus.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            color: #fff;
            padding: 24px;
        }
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        .offline-icon {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px;
            border: 2px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
        }
        .offline-icon i {
            font-size: 42px;
            opacity: 0.9;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .offline-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-retry {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            backdrop-filter: blur(4px);
        }
        .btn-retry:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }
        .pending-info {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .pending-info p {
            font-size: 13px;
            margin: 0;
            opacity: 0.8;
        }
        .pending-info .badge {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
        }
        /* Pulse animation on icon */
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 0 20px rgba(255,255,255,0); }
        }
        .offline-icon {
            animation: pulse 3s infinite;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fa-solid fa-wifi-slash"></i>
        </div>
        <h1>Sem Conexão</h1>
        <p>
            Você está sem internet no momento.
            Suas ações realizadas offline serão sincronizadas automaticamente
            quando a conexão voltar.
        </p>
        <div class="offline-actions">
            <button class="btn-retry" onclick="location.reload()">
                <i class="fa-solid fa-rotate-right"></i>
                Tentar Novamente
            </button>
            <a href="/promotor/dashboard" class="btn-retry">
                <i class="fa-solid fa-house"></i>
                Voltar ao Painel
            </a>
        </div>

        <div class="pending-info" id="pendingInfo" style="display:none;">
            <p>
                <i class="fa-solid fa-cloud-arrow-up"></i>
                Você tem <span class="badge" id="pendingCount">0</span> ações pendentes de sincronização.
            </p>
        </div>
    </div>

    <script>
        // Show pending count if available
        if (window.indexedDB) {
            const req = indexedDB.open('griffus_offline', 1);
            req.onsuccess = (e) => {
                const db = e.target.result;
                if (db.objectStoreNames.contains('sync_queue')) {
                    const tx = db.transaction('sync_queue', 'readonly');
                    const store = tx.objectStore('sync_queue');
                    const countReq = store.count();
                    countReq.onsuccess = () => {
                        if (countReq.result > 0) {
                            document.getElementById('pendingCount').textContent = countReq.result;
                            document.getElementById('pendingInfo').style.display = 'block';
                        }
                    };
                }
            };
        }
    </script>
</body>
</html>
